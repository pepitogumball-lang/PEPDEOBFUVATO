name: Build Android Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'

    - name: Create References Directory
      run: mkdir -p References

    - name: Download Dependencies (Placeholder)
      run: |
        echo "In a real scenario, you should upload your mobile DLLs as secrets or to a private storage."
        echo "For now, this step is a placeholder. The build will fail if References/ are missing."

    - name: Restore dependencies
      run: dotnet restore CustomKnight/CustomKnight.csproj

    - name: Build Mod
      run: dotnet build CustomKnight/CustomKnight.csproj --configuration Release --no-restore

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: CustomKnight-Mobile-DLL
        path: CustomKnight/bin/Release/net472/CustomKnightPEPDEOBFUVATO.dll
